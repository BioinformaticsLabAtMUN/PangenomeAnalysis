# =============================================================================
#  envs/pangenome_env.yml
#
#  Built from what the scripts ACTUALLY import (verified by grepping all .py
#  files in scriptse/ and input_scripts/), not from guesswork.
#
#  Python 3.12 used to match the existing requirements.txt which was compiled
#  with pip-compile under Python 3.12.
#
#  Packages intentionally NOT listed here:
#    - sparse_utils   → local file inside scriptse/, not a pip package
#    - urllib3        → installed automatically as a dependency of requests
#    - certifi        → installed automatically as a dependency of requests
#    - charset-normalizer → dependency of requests
#    - idna           → dependency of requests
#    - six            → dependency of python-dateutil / statsmodels
#    - Standard library modules (os, sys, re, json, etc.) → built into Python
# =============================================================================

name: pangenome_env

channels:
  - conda-forge      # highest priority
  - bioconda         # for cd-hit
  - defaults

dependencies:
  # ── Python version — match what your requirements.txt was compiled for ─────
  - python=3.12

  # ── Bioinformatics tool ───────────────────────────────────────────────────
  - cd-hit>=4.8.1      # the actual cd-hit binary, provided via bioconda

  # ── Core scientific stack ─────────────────────────────────────────────────
  - numpy>=1.26         # 2.x is fine but 1.26 is the last stable 1.x
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3   # used by several annotation/analysis scripts

  # ── Stats ─────────────────────────────────────────────────────────────────
  - statsmodels>=0.14   # directly imported: statsmodels.stats.stattools
                        # WAS MISSING FROM PREVIOUS yml

  # ── Plotting ──────────────────────────────────────────────────────────────
  - matplotlib>=3.7
  - seaborn>=0.13
  - plotly>=5.15

  # ── HTTP / API (UniProt annotation) ───────────────────────────────────────
  - requests>=2.31

  # ── pip-only packages ─────────────────────────────────────────────────────
  - pip
  - pip:
    - biopython>=1.83    # Bio, Bio.SeqIO, Bio.Seq, Bio.SeqRecord
    - tqdm>=4.65         # progress bars in annotation scripts
    - fastcluster>=1.2.6 # fast hierarchical clustering used in pan_viz.py
                         # WAS MISSING FROM PREVIOUS yml
